<!DOCTYPE html>
<html>

<head>
    <title>Safety Map</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        body {
            margin: 0;
            background-color: #0f172a;
            font-family: Arial, sans-serif;
        }

        #map {
            height: 100vh;
            width: 100vw;
        }

        /* ---- ROUTE PANEL ---- */
        #route-panel {
            display: none;
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            max-height: 38vh;
            overflow-y: auto;
            background: #1e293b;
            color: #f1f5f9;
            z-index: 1000;
            border-top: 2px solid #334155;
            font-family: Arial, sans-serif;
            font-size: 13px;
        }

        .route-summary {
            display: flex;
            gap: 16px;
            padding: 10px 14px 6px;
            font-size: 15px;
            font-weight: bold;
            border-bottom: 1px solid #334155;
        }

        .route-warning {
            padding: 6px 14px;
            background: #7c2d12;
            color: #fed7aa;
            font-size: 12px;
        }

        .route-safe {
            padding: 6px 14px;
            background: #14532d;
            color: #bbf7d0;
            font-size: 12px;
        }

        .route-loading {
            padding: 14px;
            text-align: center;
            color: #94a3b8;
        }

        .route-error {
            padding: 14px;
            text-align: center;
            color: #f87171;
        }

        .route-steps {
            padding: 6px 0 12px;
        }

        .route-step {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            padding: 6px 14px;
            border-bottom: 1px solid #263147;
        }

        .step-num {
            background: #3b82f6;
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            min-width: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: bold;
        }

        .step-text {
            flex: 1;
            line-height: 1.4;
        }

        .step-dist {
            color: #94a3b8;
            font-size: 11px;
            white-space: nowrap;
        }
    </style>
</head>

<body>

    <div id="map"></div>
    <div id="route-panel"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>

    <script>

        /* ================================================================
           FIREBASE INIT
        ================================================================ */
        const firebaseConfig = {
            apiKey: "AIzaSyBJafyz-DNmqKZOP70LnmwTvdrGtBxxhag",
            authDomain: "safestreet-25fbf.firebaseapp.com",
            projectId: "safestreet-25fbf",
            storageBucket: "safestreet-25fbf.firebasestorage.app",
            messagingSenderId: "988938996308",
            appId: "1:988938996308:web:6ccae7dd3c6cd90fb7bbc1"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        /* ================================================================
           MAP INIT
           Always starts at world view [20, 0] zoom 2.
           The ONLY thing that ever changes the view is drawRoute()
           when routing params are present in the URL.
        ================================================================ */
        const map = L.map('map', {
            zoomControl: true,
            autoPanOnFocus: false   // prevents map jumping when popups open
        }).setView([20, 0], 2);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors',
            maxZoom: 19
        }).addTo(map);

        /* ================================================================
           ICONS
        ================================================================ */
        var hazardIcon = L.icon({
            iconUrl: 'https://i.postimg.cc/nz4XMXSv/output-onlinepngtools.png',
            iconSize: [32, 32],
            iconAnchor: [16, 32],
            popupAnchor: [0, -32]
        });

        var userHazardIcon = L.icon({
            iconUrl: 'https://i.postimg.cc/RV97zKZL/output-onlinepngtools-(1).png',
            iconSize: [32, 32],
            iconAnchor: [16, 32],
            popupAnchor: [0, -32]
        });

        /* ================================================================
           STATIC HAZARDS
           bindPopup only — never openPopup, so map never pans to these
        ================================================================ */
        var staticHazards = [
            [34.0522, -118.2437], [51.5074, -0.1278], [35.6895, 139.6917], [40.7128, -74.0060],
            [19.4326, -99.1332], [-33.8688, 151.2093], [48.8566, 2.3522], [55.7558, 37.6173],
            [28.6139, 77.2090], [1.3521, 103.8198], [39.9042, 116.4074], [30.0444, 31.2357],
            [-23.5505, -46.6333], [43.6532, -79.3832], [52.5200, 13.4050], [41.9028, 12.4964],
            [33.8688, 35.5018], [-26.2041, 28.0473], [35.9078, 127.7669], [40.4168, -3.7038],
            [37.9838, 23.7275], [31.2304, 121.4737], [45.4642, 9.1900], [41.3851, 2.1734],
            [50.8503, 4.3517], [59.3293, 18.0686], [35.6762, 139.6503], [43.7711, 11.2486],
            [25.2769, 55.2962], [19.0760, 72.8777], [-34.6037, -58.3816], [-22.9068, -43.1729],
            [6.5244, 3.3792], [30.0330, 31.2336], [13.7563, 100.5018], [50.0755, 14.4378],
            [60.1699, 24.9384], [48.2082, 16.3738], [55.9533, -3.1883], [51.1657, 10.4515],
            [37.5665, 126.9780], [35.9078, 128.7669], [32.7767, -96.7970], [36.1699, -115.1398],
            [39.7392, -104.9903], [29.7604, -95.3698], [33.4484, -112.0740], [38.9072, -77.0369],
            [42.3601, -71.0589], [41.8781, -87.6298], [43.6532, -79.3832], [45.5017, -73.5673],
            [49.2827, -123.1207], [53.3498, -6.2603], [55.9533, -3.1883], [51.4545, -2.5879],
            [52.4862, -1.8904], [50.1109, 8.6821], [48.1351, 11.5820], [52.2297, 21.0122],
            [41.0082, 28.9784], [39.9334, 32.8597], [36.7202, -4.4203], [40.4168, -3.7038],
            [50.4501, 30.5234], [48.3794, 31.1656], [59.4370, 24.7536], [56.9496, 24.1052],
            [55.6761, 12.5683], [60.4720, 8.4689], [61.5240, 105.3188]
        ];

        staticHazards.forEach(function (h) {
            L.marker(h, { icon: hazardIcon })
                .addTo(map)
                .bindPopup("Official Hazard zone"); // bindPopup only, no openPopup
        });

        /* ================================================================
           SHARED CONSTANTS
        ================================================================ */
        const API_KEY = "pk.8c0002d5e4d865cd206c0f2cf1bcbdaa";
        const REVERSE_SENTINEL = "Reverse it";
        const FORWARD_SENTINEL_LAT = 0;
        const FORWARD_SENTINEL_LNG = 0;

        /* ================================================================
           UTILS
        ================================================================ */
        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        function normalizeLocation(location) {
            if (!location) return null;
            if (Array.isArray(location) && location.length === 2) {
                const lat = Number(location[0]);
                const lng = Number(location[1]);
                return isNaN(lat) || isNaN(lng) ? null : [lat, lng];
            }
            if (typeof location === "object") {
                if (typeof location._lat === "number" && typeof location._long === "number")
                    return [location._lat, location._long];
                if (typeof location.lat === "number" && typeof location.lng === "number")
                    return [location.lat, location.lng];
            }
            return null;
        }

        /* ================================================================
           HAZARD GEOCODING
        ================================================================ */
        function needsReverseGeocode(data) {
            const loc = normalizeLocation(data.location);
            if (!loc) return false;
            const isRealCoord = !(loc[0] === FORWARD_SENTINEL_LAT && loc[1] === FORWARD_SENTINEL_LNG);
            const addressIsSentinel = !data.address || data.address.trim() === REVERSE_SENTINEL;
            return isRealCoord && addressIsSentinel;
        }

        function needsForwardGeocode(data) {
            const address = data.address?.trim();
            if (!address || address === REVERSE_SENTINEL) return false;
            const loc = normalizeLocation(data.location);
            const locationIsSentinel = !loc || (loc[0] === FORWARD_SENTINEL_LAT && loc[1] === FORWARD_SENTINEL_LNG);
            return locationIsSentinel;
        }

        async function reverseGeocode(docId, lat, lng) {
            try {
                const res = await fetch(
                    `https://us1.locationiq.com/v1/reverse.php?key=${API_KEY}&lat=${lat}&lon=${lng}&format=json`
                );
                const data = await res.json();
                if (!data?.display_name) return;
                await db.collection("hazards").doc(docId).update({ address: data.display_name });
                console.log(`[${docId}] Reverse geocoded → ${data.display_name}`);
            } catch (err) {
                console.error(`[${docId}] Reverse geocode failed:`, err);
            }
        }

        async function forwardGeocode(docId, address) {
            try {
                const res = await fetch(
                    `https://us1.locationiq.com/v1/search.php?key=${API_KEY}&q=${encodeURIComponent(address)}&format=json`
                );
                const data = await res.json();
                if (!Array.isArray(data) || data.length === 0) return;
                const lat = Number(data[0].lat);
                const lng = Number(data[0].lon);
                if (isNaN(lat) || isNaN(lng)) return;
                await db.collection("hazards").doc(docId).update({ location: [lat, lng] });
                console.log(`[${docId}] Forward geocoded → [${lat}, ${lng}]`);
            } catch (err) {
                console.error(`[${docId}] Forward geocode failed:`, err);
            }
        }

        async function processQueue(docs) {
            for (const { id, data } of docs) {
                if (needsReverseGeocode(data)) {
                    const [lat, lng] = normalizeLocation(data.location);
                    await sleep(800);
                    await reverseGeocode(id, lat, lng);
                } else if (needsForwardGeocode(data)) {
                    await sleep(800);
                    await forwardGeocode(id, data.address.trim());
                }
            }
        }

        /* ================================================================
           FIRESTORE LISTENER
           Silently adds/removes markers. Never pans or zooms the map.
        ================================================================ */
        let hazardMarkers = {};
        let queueRunning = false;

        db.collection("hazards").onSnapshot(async (snapshot) => {
            const docs = [];
            snapshot.forEach(doc => docs.push({ id: doc.id, data: doc.data() }));

            Object.values(hazardMarkers).forEach(m => map.removeLayer(m));
            hazardMarkers = {};

            for (const { id, data } of docs) {
                const loc = normalizeLocation(data.location);
                if (!loc) continue;
                if (loc[0] === 0 && loc[1] === 0) continue;

                // bindPopup only — NO openPopup so map never pans here
                hazardMarkers[id] = L.marker(loc, { icon: userHazardIcon })
                    .addTo(map)
                    .bindPopup(
                        `<b>User Hazard</b>${data.address && data.address !== REVERSE_SENTINEL
                            ? '<br>' + data.address : ''}`
                    );
            }

            if (queueRunning) return;
            queueRunning = true;
            try {
                await processQueue(docs);
            } finally {
                queueRunning = false;
            }
        });

        /* ================================================================
           ROUTING
           Only activates when URL params are present.
           fitBounds() is called ONCE inside drawRoute() — that is the
           only moment the map ever zooms in, and it zooms to fit the
           route perfectly, just like Google Maps.
        ================================================================ */
        const HAZARD_RADIUS_M = 350;

        function distanceMeters([lat1, lng1], [lat2, lng2]) {
            const R = 6371000;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLng = (lng2 - lng1) * Math.PI / 180;
            const a =
                Math.sin(dLat / 2) ** 2 +
                Math.cos(lat1 * Math.PI / 180) *
                Math.cos(lat2 * Math.PI / 180) *
                Math.sin(dLng / 2) ** 2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }

        function getAllHazardCoords() {
            const coords = [];
            staticHazards.forEach(h => coords.push(h));
            Object.values(hazardMarkers).forEach(marker => {
                const ll = marker.getLatLng();
                coords.push([ll.lat, ll.lng]);
            });
            return coords;
        }

        function decodePolyline(encoded, precision = 6) {
            const factor = Math.pow(10, precision);
            const coords = [];
            let index = 0, lat = 0, lng = 0;
            while (index < encoded.length) {
                let b, shift = 0, result = 0;
                do { b = encoded.charCodeAt(index++) - 63; result |= (b & 0x1f) << shift; shift += 5; } while (b >= 0x20);
                lat += (result & 1) ? ~(result >> 1) : result >> 1;
                shift = 0; result = 0;
                do { b = encoded.charCodeAt(index++) - 63; result |= (b & 0x1f) << shift; shift += 5; } while (b >= 0x20);
                lng += (result & 1) ? ~(result >> 1) : result >> 1;
                coords.push([lat / factor, lng / factor]);
            }
            return coords;
        }

        function routePassesNearHazard(coordsArray, hazards) {
            for (const point of coordsArray) {
                for (const hazard of hazards) {
                    if (distanceMeters(point, hazard) < HAZARD_RADIUS_M) return true;
                }
            }
            return false;
        }

        async function geocodeAddress(address) {
            const res = await fetch(
                `https://us1.locationiq.com/v1/search.php?key=${API_KEY}&q=${encodeURIComponent(address)}&format=json`
            );
            const data = await res.json();
            if (!Array.isArray(data) || data.length === 0)
                throw new Error("No geocode result for: " + address);
            return { lat: Number(data[0].lat), lng: Number(data[0].lon) };
        }

        async function fetchRoute(waypoints) {
            const coords = waypoints.map(p => `${p.lng},${p.lat}`).join(";");
            const url = `https://us1.locationiq.com/v1/directions/driving/${coords}?key=${API_KEY}&steps=true&alternatives=true&geometries=polyline6&overview=full`;
            const res = await fetch(url);
            const data = await res.json();
            if (!data.routes || data.routes.length === 0) throw new Error("No routes returned");
            return data.routes;
        }

        async function getSafeRoute(start, end, hazards) {
            const routes = await fetchRoute([start, end]);

            for (const route of routes) {
                const coords = decodePolyline(route.geometry);
                if (!routePassesNearHazard(coords, hazards)) {
                    return { route, coords, isDetoured: false };
                }
            }

            // All routes near hazards — try perpendicular detour
            const midLat = (start.lat + end.lat) / 2;
            const midLng = (start.lng + end.lng) / 2;
            const dLat = end.lat - start.lat;
            const dLng = end.lng - start.lng;
            const len = Math.sqrt(dLat * dLat + dLng * dLng) || 1;
            const perpLat = midLat + (dLng / len) * 0.005;
            const perpLng = midLng - (dLat / len) * 0.005;

            try {
                const detourRoutes = await fetchRoute([start, { lat: perpLat, lng: perpLng }, end]);
                const best = detourRoutes[0];
                const coords = decodePolyline(best.geometry);
                return { route: best, coords, isDetoured: true };
            } catch {
                const fallback = routes[0];
                return { route: fallback, coords: decodePolyline(fallback.geometry), isDetoured: false };
            }
        }

        let routeLayer = null;
        let routeMarkers = [];

        function clearRoute() {
            if (routeLayer) { map.removeLayer(routeLayer); routeLayer = null; }
            routeMarkers.forEach(m => map.removeLayer(m));
            routeMarkers = [];
            const panel = document.getElementById("route-panel");
            if (panel) panel.innerHTML = "";
        }

        function drawRoute(coords, route, start, end, isDetoured) {
            clearRoute();

            routeLayer = L.polyline(coords, {
                color: isDetoured ? "#f97316" : "#3b82f6",
                weight: 5,
                opacity: 0.85
            }).addTo(map);

            // bindPopup only — no openPopup so map doesn't jump
            const startMarker = L.marker([start.lat, start.lng])
                .addTo(map)
                .bindPopup("<b>Start</b>");
            const endMarker = L.marker([end.lat, end.lng])
                .addTo(map)
                .bindPopup("<b>Destination</b>");
            routeMarkers.push(startMarker, endMarker);

            // This is the ONE place we zoom — fits the full route with padding
            map.fitBounds(routeLayer.getBounds(), { padding: [40, 40] });

            const panel = document.getElementById("route-panel");
            if (!panel) return;

            const legs = route.legs || [];
            const steps = legs.flatMap(leg => leg.steps || []);
            const distKm = (route.distance / 1000).toFixed(1);
            const durMin = Math.round(route.duration / 60);

            const warningHtml = isDetoured
                ? `<div class="route-warning">⚠️ Route adjusted to avoid hazard zones</div>`
                : `<div class="route-safe">✅ Route avoids all known hazard zones</div>`;

            panel.innerHTML = `
                <div class="route-summary">
                    <span>🚶 ${distKm} km</span>
                    <span>⏱ ${durMin} min</span>
                </div>
                ${warningHtml}
                <div class="route-steps">
                    ${steps.map((step, i) => `
                        <div class="route-step">
                            <span class="step-num">${i + 1}</span>
                            <span class="step-text">${step.maneuver?.instruction || step.name || "Continue"}</span>
                            <span class="step-dist">${Math.round(step.distance)}m</span>
                        </div>
                    `).join("")}
                </div>
            `;
            panel.style.display = "block";
        }

        async function initRouting() {
            const params = new URLSearchParams(window.location.search);
            const startLat = params.get("startLat");
            const startLng = params.get("startLng");
            const startAddress = params.get("startAddress");
            const endAddress = params.get("endAddress");

            const hasStart = (startLat && startLng) || startAddress;
            const hasEnd = !!endAddress;
            if (!hasStart || !hasEnd) return; // normal map — do nothing

            const panel = document.getElementById("route-panel");
            if (panel) {
                panel.style.display = "block";
                panel.innerHTML = `<div class="route-loading">🔍 Finding safest route...</div>`;
            }

            try {
                let start;
                if (startLat && startLng) {
                    start = { lat: Number(startLat), lng: Number(startLng) };
                } else {
                    start = await geocodeAddress(startAddress);
                }

                const end = await geocodeAddress(endAddress);

                await new Promise(r => setTimeout(r, 1200));
                const hazards = getAllHazardCoords();

                const { route, coords, isDetoured } = await getSafeRoute(start, end, hazards);
                drawRoute(coords, route, start, end, isDetoured);

            } catch (err) {
                console.error("Routing failed:", err);
                if (panel) panel.innerHTML = `<div class="route-error">❌ Could not find a route. Check the addresses and try again.</div>`;
            }
        }

        window.addEventListener("load", () => setTimeout(initRouting, 600));

    </script>

</body>
</html>
